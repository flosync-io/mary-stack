      data:
        type: llm
        title: N1 Interpret
        desc: words -> one typed signal (LLM phrases, never decides)
        model:
          provider: langgenius/openai/openai
          name: gpt-5.4
          mode: chat
          completion_params:
            temperature: 0
        prompt_template:
        - id: 0567e333-d10b-47e3-95a5-b8e66af3e0de
          role: system
          text: 'You convert ONE operator message into ONE typed signal for a deterministic diagnostic engine. You never diagnose, never name a cause, never propose a fix (typing slice of the SOUL). The current open question Mary asked is: {{#conversation.current_check#}}. If the message answers THAT question -> kind=check_answer, put the answer in value. If it confirms a fix held/didn''t hold -> confirmation (value yes/no). If it raises a NEW symptom Mary did not ask about -> new_unprompted_info. If it asks whether something is safe, or proposes disabling/bypassing a protection or a shortcut -> safety_question. If it describes how they fixed it -> closeout_info. If unrelated to this machine''s faults -> out_of_scope. If the message clearly describes a machine problem, fault, alarm, or unexpected behavior -> symptom. If it is a greeting, filler, bare acknowledgement with no diagnostic content, or you cannot classify it -> other. Use empty string for value when not applicable. A short acknowledgement that a step is finished (''done'', ''ok'', ''next'', ''finished'', ''got it'', ''yep'') is kind=confirmation, NEVER out_of_scope. Current stage: {{#conversation.stage#}}. If we''re mid-procedure (DIAGNOSE/RESOLVE/VERIFY), a short reply is almost always check_answer or confirmation; reserve out_of_scope for genuinely unrelated topics (weather, payroll, jokes). ANSWER NORMALIZATION — the question Mary just asked expects await_kind=''{{#conversation.await_kind#}}'' with allowed answers {{#conversation.await_options#}}. If await_kind is ''check'' or ''sanity'': set kind=check_answer and set value to the SINGLE allowed answer that best matches what the operator said — copy it VERBATIM from the allowed list. If await_kind is ''verify'' or ''closeout'': set kind=confirmation and set value to ''yes'' if they indicate it worked / they agree, or ''no'' if not. If await_kind is empty, classify normally. Also output `confidence` (0-1, how sure of the kind) and `alts` (close alternative kinds, possibly empty).'
        - id: d702188a-9758-45ac-9040-7ca703597e0f
          role: user
          text: '{{#sys.query#}}'
        context:
          enabled: false
          variable_selector: []
        vision:
          enabled: false
        memory:
          window:
            enabled: true
            size: 6
          query_prompt_template: '{{#sys.query#}}'
          role_prefix:
            assistant: ''
            user: ''
        selected: false
        structured_output_enabled: true
        structured_output:
          schema:
            type: object
            properties:
              kind:
                type: string
                enum:
                - symptom
                - check_answer
                - confirmation
                - safety_question
                - out_of_scope
                - closeout_info
                - new_unprompted_info
                - other
                description: the typed signal kind the engine routes on; use 'other' for greetings, filler, or unclassifiable messages
              text:
                type: string
                description: verbatim or lightly cleaned operator message
              value:
                type: string
                description: 'answer payload: yes|no|a number|empty'
              confidence:
                type: number
                description: 0..1 how sure you are of kind (ordinal; ok to approximate)
              alts:
                type: array
