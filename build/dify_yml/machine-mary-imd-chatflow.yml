    - id: engine
      position:
        x: 1440
        y: 300
      data:
        type: code
        title: N8 Engine (Match·Diagnose·Resolve·Verify)
        desc: the deterministic state machine. Decision-SOUL lives here.
        code_language: python3
        variables:
        - variable: signal
          value_selector:
          - interpret
          - structured_output
          value_type: object
        - variable: match_scores_obj
          value_selector:
          - matchscore
          - structured_output
          value_type: object
        - variable: guard_decision
          value_selector:
          - guard
          - guard_decision
          value_type: string
        - variable: guard_reason
          value_selector:
          - guard
          - guard_reason
          value_type: string
        - variable: knowledge_json
          value_selector:
          - kb_pick
          - knowledge
          value_type: string
        - variable: stage
          value_selector:
          - conversation
          - stage
          value_type: string
        - variable: case
          value_selector:
          - conversation
          - case
          value_type: string
        - variable: matched_fm
          value_selector:
          - conversation
          - matched_fm
          value_type: string
        - variable: candidate_causes
          value_selector:
          - conversation
          - candidate_causes
          value_type: string
        - variable: ruled_out
          value_selector:
          - conversation
          - ruled_out
          value_type: string
        - variable: current_cause
          value_selector:
          - conversation
          - current_cause
          value_type: string
        - variable: current_check
          value_selector:
          - conversation
          - current_check
          value_type: string
        - variable: current_step_idx
          value_selector:
          - conversation
          - current_step_idx
          value_type: string
        - variable: attempts
          value_selector:
          - conversation
          - attempts
          value_type: string
        - variable: attempts_cap
          value_selector:
          - conversation
          - attempts_cap
          value_type: string
        - variable: flags
          value_selector:
          - start
          - flags
          value_type: string
        - variable: clarify_attempts
          value_selector:
          - conversation
          - clarify_attempts
          value_type: number
        outputs:
          move_type:
            type: string
            children: null
          render_brief:
            type: string
            children: null
          allowed_facts:
            type: string
            children: null
          terminal:
            type: string
            children: null
          out_stage:
            type: string
            children: null
          out_case:
            type: string
            children: null
          out_matched_fm:
            type: string
            children: null
          out_candidate_causes:
            type: string
            children: null
          out_ruled_out:
            type: string
            children: null
          out_current_cause:
            type: string
            children: null
          out_current_check:
            type: string
            children: null
          out_current_step_idx:
            type: number
            children: null
          out_attempts:
            type: number
            children: null
          out_await_kind:
            type: string
            children: null
          out_await_options:
            type: string
            children: null
          out_status:
            type: string
            children: null
          out_options:
            type: string
            children: null
          out_capture:
            type: string
            children: null
          out_trace:
            type: string
            children: null
          out_clarify_attempts:
            type: number
            children: null
          out_modality:
            type: string
            children: null
          out_default:
            type: string
            children: null
        code: "import json, re\n\n_SOUL_OBS_WEIGHT = {\"audio\": 0.5}  # decision-SOUL: audio cues only when reliable\nNONE_OF_THESE = \"__none_of_these__\"  # deterministic clarify escape: always appended to clarify MCQs, never LLM-authored\n_ELICIT_EMPTY = (\"no\", \"nope\", \"nothing\", \"nothing changed\", \"no change\", \"nothing different\", \"none\", \"dunno\", \"dont know\", \"do not know\", \"no idea\", \"not sure\", \"unsure\", \"idk\", \"not really\", \"cant say\", \"cannot say\", \"cant tell\", \"hard to say\", \"maybe\")  # elicit: answer adds no new info -> counts toward tapped-out\n\ndef main(signal, match_scores_obj, guard_decision, guard_reason, knowledge_json,\n         stage, case, matched_fm, candidate_causes, ruled_out,\n         current_cause, current_check, current_step_idx, attempts, attempts_cap, flags=\"\", clarify_attempts=0, elicit_attempts=0):\n    K = json.loads(knowledge_json or \"{}\")\n    if isinstance(signal, str):\n        signal = json.loads(signal or \"{}\")\n    if isinstance(match_scores_obj, str):\n        match_scores_obj = json.loads(match_scores_obj or \"{}\")\n    scores_list = (match_scores_obj or {}).get(\"scores\", []) if isinstance(match_scores_obj, dict) else []\n    match_scores = {s.get(\"fm_id\"): s.get(\"score\", 0) for s in scores_list}\n    case = json.loads(case or \"{}\")\n    candidate_causes = json.loads(candidate_causes or \"[]\")\n    ruled_out = json.loads(ruled_out or \"[]\")\n    FMs = {f[\"id\"]: f for f in K.get(\"failure_modes\", [])}\n    CHECKS = {c[\"id\"]: c for c in K.get(\"checks\", [])}\n    PROCS = {p[\"id\"]: p for p in K.get(\"procedures\", [])}\n    STEPS = {s[\"id\"]: s for s in K.get(\"steps\", [])}\n    DECLINE_FLOOR = 0.45\n    TIE_BAND = 0.10\n    CLARIFY_CAP = 2\n    ELICIT_CAP = 3\n    try:\n        clarify_attempts = int(clarify_attempts or 0)\n    except Exception:\n        clarify_attempts = 0\n    try:\n        elicit_attempts = int(elicit_attempts or 0)\n    except Exception:\n        elicit_attempts = 0\n    kind = signal.get(\"kind\")\n    value = signal.get(\"value\")\n\n    # honor frontend lifecycle flags (eval/frontend send these alongside the message)\n    try:\n        _flags = json.loads(flags or \"{}\") if isinstance(flags, str) else (flags or {})\n    except Exception:\n        _flags = {}\n    if _flags.get(\"confirmed\"):\n        kind = \"confirmation\"; value = \"yes\"\n        signal[\"kind\"] = \"confirmation\"; signal[\"value\"] = \"yes\"\n    elif _flags.get(\"closeout\"):\n        kind = \"closeout_info\"; signal[\"kind\"] = \"closeout_info\"\n\n    trace = {\"in_kind\": kind, \"in_value\": value, \"guard\": guard_decision, \"stage_in\": stage}\n\n    if guard_decision in (\"STOP\", \"LOTO_REQUIRED\"):\n        mt = \"STOP\" if guard_decision == \"STOP\" else \"LOTO\"\n        return _out(locals(), {\"type\": mt, \"payload\": {\"reason\": guard_reason}, \"allowed_facts\": {}}, terminal=False)\n\n    if stage == \"DIAGNOSE\" and not matched_fm:\n        stage = \"MATCH\"\n    if stage == \"RESOLVE\" and not current_cause:\n        stage = \"DIAGNOSE\"\n    if not case:\n        case = {\"id\": None, \"machine\": K.get(\"machine_id\"), \"status\": \"open\",\n                \"checks\": [], \"attempts\": [], \"matched_fm\": None,\n                \"confirmed_cause\": None, \"$soul_version\": K.get(\"soul_version\")}\n\n    # ---- CLARIFY escape: operator tapped the deterministic \"none of these\" option ----\n    # Every clarify MCQ carries an appended NONE_OF_THESE option (see _await). Catch its\n    # selection HERE, before the other/symptom handlers can swallow it: a rejection used to\n    # classify as other (re-ask, no burn) or symptom (back to SANITY, no burn), so the cap\n    # never tripped and DECLINE was unreachable. Now every rejection burns a clarify slot and\n    # at the cap we DECLINE (terminal). Scoped to CLARIFY; meaningless elsewhere.\n    if stage == \"CLARIFY\" and (value or \"\").strip() == NONE_OF_THESE:\n        clarify_attempts += 1\n        trace[\"reason\"] = \"none_of_these\"\n        if clarify_attempts >= CLARIFY_CAP:\n            case.pop(\"_clarify\", None)\n            trace[\"reason\"] = \"clarify_exhausted\"\n            return _out(locals(), {\"type\": \"DECLINE\", \"payload\": {\"reason\": \"operator rejected all candidates\"}, \"allowed_facts\": {}}, terminal=True, status=\"unresolved\")\n        # below cap: stay open and collect more info — a real symptom next turn re-matches (-> DIAGNOSE)\n        _no = [o[\"title\"] for o in case.get(\"_clarify\", [])]\n        return _out(locals(), {\"type\": \"ASK_CLARIFY\", \"payload\": {\"ask\": \"None of those? Tell me more about what the machine is actually doing.\", \"options\": _no}, \"allowed_facts\": {\"options\": _no}}, terminal=False)\n\n    if kind == \"out_of_scope\":\n        if stage in (\"INTAKE\", \"MATCH\", \"\"):\n            return _out(locals(), {\"type\": \"REDIRECT\", \"payload\": {}, \"allowed_facts\": {}}, terminal=False)\n        # mid-flow (SANITY/DIAGNOSE/RESOLVE/VERIFY/CLOSEOUT): a bland reply like \"done\"/\"ok\"\n        # is a continuation, not an off-topic. Reclassify and let the stage handle it.\n        kind = \"confirmation\"\n        signal[\"kind\"] = \"confirmation\"\n\n    # ---- OTHER: greeting/filler — do not capture reported, advance nothing ----\n    if kind == \"other\":\n        if stage in (\"INTAKE\", \"MATCH\", \"\"):\n            return _out(locals(), {\"type\": \"INTAKE\", \"payload\": {}, \"allowed_facts\": {}}, terminal=False)\n        # SANITY: re-ask the sanity question; don't append to sanity_notes\n        if stage == \"SANITY\":\n            return _out(locals(), {\"type\": \"SANITY\", \"payload\": {\"symptom\": case.get(\"reported\", \"\"), \"reask\": True},\n                        \"allowed_facts\": {\"symptom\": case.get(\"reported\", \"\")}}, terminal=False)\n        # ELICIT: re-ask the probe; filler must not append to reported\n        if stage == \"ELICIT\":\n            _ec = case.get(\"_elicit\", {}) or {}\n            return _out(locals(), {\"type\": \"ELICIT\", \"payload\": {\"candidates\": _ec.get(\"candidates\", []), \"round\": _ec.get(\"round\", 1), \"reask\": True}, \"allowed_facts\": {}}, terminal=False)\n        # RESOLVE: re-give the current step without advancing current_step_idx\n        if stage == \"RESOLVE\" and case.get(\"procedure\") and case[\"procedure\"] in PROCS:\n            _rproc = PROCS[case[\"procedure\"]]\n            _rstep_ids = _rproc.get(\"steps\", [])\n            if current_step_idx < len(_rstep_ids):\n                _rst = STEPS[_rstep_ids[current_step_idx]]\n                return _out(locals(), {\"type\": \"GIVE_STEP\",\n                            \"payload\": {\"step\": _rst[\"action\"], \"expected\": _rst.get(\"expected_result\"), \"reask\": True},\n                            \"allowed_facts\": {\"step\": _rst[\"action\"], \"expected\": _rst.get(\"expected_result\"), \"warnings\": _rst.get(\"warnings_before\", [])}}, terminal=False)\n        # CLOSEOUT: re-ask without appending to resolution_note\n        if stage == \"CLOSEOUT\":\n            return _out(locals(), {\"type\": \"CLOSEOUT\",\n                        \"payload\": {\"fix\": case.get(\"resolution_note\", \"\"), \"reask\": True},\n                        \"allowed_facts\": {\"fix\": case.get(\"resolution_note\", \"\")}}, terminal=False)\n        # CLARIFY: re-ask without burning a clarify_attempts slot\n        if stage == \"CLARIFY\":\n            _ropts = case.get(\"_clarify\", [])\n            _ro = [o[\"title\"] for o in _ropts]\n            return _out(locals(), {\"type\": \"ASK_CLARIFY\",\n                        \"payload\": {\"ask\": \"Which of these is it closest to?\", \"options\": _ro, \"reask\": True},\n                        \"allowed_facts\": {\"options\": _ro}}, terminal=False)\n        # DIAGNOSE/VERIFY: fall through — both handle non-signal kinds natively\n        # (VERIFY re-asks if kind not in confirmation/check_answer;\n        #  DIAGNOSE re-picks current check without a check_answer entry)\n\n    # ---- CLOSEOUT scribe mode: operator returns with what fixed it ----\n    if kind == \"closeout_info\" and stage != \"CLOSEOUT\":\n        case[\"resolution_note\"] = (signal.get(\"text\") or \"\").strip()\n        stage = \"CLOSEOUT\"\n        return _out(locals(), {\"type\": \"CLOSEOUT\", \"payload\": {\"fix\": case[\"resolution_note\"]},\n                    \"allowed_facts\": {\"fix\": case[\"resolution_note\"]}}, terminal=False)\n    if stage == \"CLOSEOUT\":\n        _cv = (value or signal.get(\"text\") or \"\").lower()\n        if re.search(r\"\\b(confirm|yes|yeah|yep|correct|right|save|good|ok|okay)\\b\", _cv) and not re.search(r\"\\b(no|not|wrong|nope|isn)\\b\", _cv):\n            return _out(locals(), {\"type\": \"RESOLVED\", \"payload\": {}, \"allowed_facts\": {}}, terminal=True, status=\"resolved\")\n        if re.search(r\"\\b(no|not|wrong|nope)\\b\", _cv):\n            return _out(locals(), {\"type\": \"CLOSEOUT\", \"payload\": {\"fix\": case.get(\"resolution_note\", \"\")},\n                        \"allowed_facts\": {\"fix\": case.get(\"resolution_note\", \"\")}}, terminal=False)\n        case[\"resolution_note\"] = (case.get(\"resolution_note\", \"\") + \" \" + (signal.get(\"text\") or \"\")).strip()\n        return _out(locals(), {\"type\": \"CLOSEOUT\", \"payload\": {\"fix\": case[\"resolution_note\"]},\n                    \"allowed_facts\": {\"fix\": case[\"resolution_note\"]}}, terminal=False)\n\n    # ---- SANITY beat ----\n    if stage == \"SANITY\":\n        _sa = (signal.get(\"text\") or \"\").strip()\n        case.setdefault(\"sanity_notes\", []).append(_sa)\n        # Fold symptom detail the operator volunteers at the sanity beat into reported so MATCH\n        # runs on the fuller complaint (Option A). Append verbatim -- the operator's exact words,\n        # no paraphrase -- unless the answer is a bare no-change reply (adds nothing). sanity_notes\n        # keeps the full answer regardless: append-to-reported, NOT move, and a strict subset of the\n        # future change_note (B) split -- antecedents like 'new tool' stay recoverable there.\n        _norm = re.sub(r\"[^a-z]+\", \" \", _sa.lower()).strip()\n        if _sa and _norm not in (\"no\", \"nope\", \"nothing\", \"nothing changed\", \"no change\", \"nothing different\"):\n            case[\"reported\"] = (case.get(\"reported\", \"\") + \" \" + _sa).strip()\n        stage = \"MATCH\"   # fall through into MATCH this turn\n    elif stage == \"ELICIT\":\n        # Operator answering a low-score probe. Elicit answers ARE symptom detail, so accumulate\n        # them into reported (the same (A) path) and re-score MATCH on the fuller complaint --\n        # reuse reported, do NOT create a new field. This is the crux: MATCH must climb on the\n        # accumulation, not on the latest message alone. The STOP signal is behavioral, not the\n        # (noisy) score: count rounds where the operator added nothing new; any real substance\n        # resets the counter. A no-new-info reply is a negation/filler or empty-after-normalize.\n        _ea = (signal.get(\"text\") or \"\").strip()\n        _enorm = re.sub(r\"[^a-z]+\", \" \", _ea.lower()).strip()\n        if _ea and _enorm and _enorm not in _ELICIT_EMPTY:\n            case[\"reported\"] = (case.get(\"reported\", \"\") + \" \" + _ea).strip()\n            case[\"_elicit_empty\"] = 0\n        else:\n            case[\"_elicit_empty\"] = int(case.get(\"_elicit_empty\", 0) or 0) + 1\n        stage = \"MATCH\"   # re-score on the accumulation\n    elif kind in (\"symptom\", \"new_unprompted_info\"):\n        case[\"reported\"] = (case.get(\"reported\", \"\") + \" \" + (signal.get(\"text\") or \"\")).strip()\n        if not matched_fm:\n            stage = \"SANITY\"\n            return _out(locals(), {\"type\": \"SANITY\", \"payload\": {\"symptom\": signal.get(\"text\")},\n                        \"allowed_facts\": {\"symptom\": signal.get(\"text\")}}, terminal=False)\n        else:\n            stage = \"MATCH\"\n\n    # ---- CLARIFY answer (we asked which fault last turn) ----\n    if stage == \"CLARIFY\":\n        opts = case.get(\"_clarify\", [])\n        ans = _best_answer(value, [o[\"title\"] for o in opts]) if opts else \"\"\n        pick = next((o for o in opts if o[\"title\"] == ans), None)\n        if pick:\n            matched_fm = pick[\"id\"]; case[\"matched_fm\"] = matched_fm\n            candidate_causes = _rank(FMs[matched_fm]); ruled_out = []\n            clarify_attempts = 0; case.pop(\"_clarify\", None)\n            stage = \"DIAGNOSE\"\n            trace[\"reason\"] = \"clarify_resolved:\" + matched_fm\n            # fall through into DIAGNOSE below\n        else:\n            clarify_attempts += 1\n            if clarify_attempts >= CLARIFY_CAP:\n                return _out(locals(), {\"type\": \"DECLINE\", \"payload\": {\"reason\": \"could not disambiguate\"}, \"allowed_facts\": {}}, terminal=True, status=\"unresolved\")\n            _o = [o[\"title\"] for o in opts]\n            return _out(locals(), {\"type\": \"ASK_CLARIFY\", \"payload\": {\"ask\": \"Which of these is it closest to?\", \"options\": _o}, \"allowed_facts\": {\"options\": _o}}, terminal=False)\n\n    # ---- MATCH (failure-mode level) ----\n    if stage == \"MATCH\":\n        scored = []\n        for fid, fm in FMs.items():\n            sig = fm[\"symptom_signature\"]\n            codes = set(re.findall(r\"\\b\\d{4,6}\\b\", (case.get(\"reported\", \"\") or \"\")))\n            alarm = bool(set(sig.get(\"alarm_codes\", [])) & codes)\n            sem = float(match_scores.get(fid, 0.0))\n            sc = 0.99 if alarm else sem\n            scored.append((sc, fm.get(\"case_count\", 0), fid, alarm))\n        scored.sort(reverse=True)\n        # #9 relative decision: alarm exact OR a clear leader >= floor -> MATCH;\n        # clear-but-low -> DECLINE; bunched (near-tie) -> clarify zone (#1).\n        top = scored[0] if scored else None\n        second = scored[1][0] if len(scored) > 1 else 0.0\n        sep = (top[0] - second) if top else 0.0\n        bunched = bool(top) and (not top[3]) and len(scored) > 1 and sep <= TIE_BAND\n        _topdump = [[round(s[0], 3), s[2]] for s in scored[:3]]\n        if not top:\n            trace[\"match\"] = {\"top\": _topdump, \"chosen\": None, \"sep\": round(sep, 3), \"floor\": DECLINE_FLOOR}\n            trace[\"reason\"] = \"no_candidates\"\n            return _out(locals(), {\"type\": \"DECLINE\", \"payload\": {\"reason\": \"no good match\"}, \"allowed_facts\": {}}, terminal=True, status=\"unresolved\")\n        if not bunched and top[0] < DECLINE_FLOOR:\n            # ELICIT (NOT the bunched-plausible CLARIFY): the description is too thin to match any\n            # known fault. Probe for more signal instead of declining -- the operator's answers\n            # accumulate in reported (ELICIT stage above) and MATCH re-scores the whole each turn.\n            # The STOP decision is BEHAVIORAL, not score-based (scores are too noisy round-to-round):\n            # DECLINE when the operator has run dry -- two no-new-info rounds in a row (_elicit_empty)\n            # -- OR the hard backstop ELICIT_CAP. The score does one thing only: clear the floor ->\n            # MATCH. Carry the top-2 candidates so Render can probe their discriminators, sharper each round.\n            _empties = int(case.get(\"_elicit_empty\", 0) or 0)\n            if elicit_attempts >= ELICIT_CAP or _empties >= 2:\n                case.pop(\"_elicit\", None); case.pop(\"_elicit_empty\", None)\n                trace[\"match\"] = {\"top\": _topdump, \"chosen\": None, \"sep\": round(sep, 3), \"floor\": DECLINE_FLOOR}\n                trace[\"reason\"] = \"elicit_exhausted\" if elicit_attempts >= ELICIT_CAP else \"elicit_tapped_out\"\n                return _out(locals(), {\"type\": \"DECLINE\", \"payload\": {\"reason\": \"no good match\"}, \"allowed_facts\": {}}, terminal=True, status=\"unresolved\")\n            _ecands = [{\"id\": s[2], \"title\": FMs[s[2]][\"title\"]} for s in scored[:2]]\n            elicit_attempts += 1\n            case[\"_elicit\"] = {\"candidates\": _ecands, \"round\": elicit_attempts}\n            stage = \"ELICIT\"\n            trace[\"match\"] = {\"top\": _topdump, \"chosen\": None, \"sep\": round(sep, 3), \"elicit_round\": elicit_attempts}\n            trace[\"reason\"] = \"elicit\"\n            return _out(locals(), {\"type\": \"ELICIT\", \"payload\": {\"candidates\": _ecands, \"round\": elicit_attempts}, \"allowed_facts\": {}}, terminal=False)\n        if bunched:\n            case.pop(\"_elicit\", None); case.pop(\"_elicit_empty\", None)\n            band = [s for s in scored if (top[0] - s[0]) <= TIE_BAND and not s[3]]\n            band.sort(key=lambda s: s[1], reverse=True)  # order options by fault-frequency\n            cl = [{\"id\": s[2], \"title\": FMs[s[2]][\"title\"]} for s in band[:3]]\n            trace[\"match\"] = {\"top\": _topdump, \"chosen\": None, \"sep\": round(sep, 3), \"bunched\": True}\n            if clarify_attempts < CLARIFY_CAP:\n                case[\"_clarify\"] = cl\n                clarify_attempts += 1\n                stage = \"CLARIFY\"\n                trace[\"reason\"] = \"ask_clarify\"\n                _o = [o[\"title\"] for o in cl]\n                return _out(locals(), {\"type\": \"ASK_CLARIFY\", \"payload\": {\"ask\": \"Which of these is it closest to?\", \"options\": _o}, \"allowed_facts\": {\"options\": _o}}, terminal=False)\n            trace[\"reason\"] = \"clarify_cap_decline\"\n            return _out(locals(), {\"type\": \"DECLINE\", \"payload\": {\"reason\": \"ambiguous - candidates too close\"}, \"allowed_facts\": {}}, terminal=True, status=\"unresolved\")\n        trace[\"match\"] = {\"top\": _topdump, \"chosen\": top[2], \"alarm_hit\": bool(top[3]), \"sep\": round(sep, 3)}\n        matched_fm = top[2]\n        case[\"matched_fm\"] = matched_fm\n        candidate_causes = _rank(FMs[matched_fm])\n        ruled_out = []\n        clarify_attempts = 0\n        elicit_attempts = 0\n        case.pop(\"_elicit\", None); case.pop(\"_elicit_empty\", None)\n        stage = \"DIAGNOSE\"\n\n    # ---- DIAGNOSE (cause level) ----\n    if stage == \"DIAGNOSE\":\n        if kind == \"check_answer\" and current_check:\n            chk = CHECKS[current_check]\n            disc = chk.get(\"discriminates\", {})\n            ans = _best_answer(value, chk.get(\"answers\", []))\n            case.setdefault(\"checks\", []).append({\"ref\": chk[\"id\"], \"ask_snapshot\": chk[\"ask\"], \"answer\": value})\n            # route the answer to whichever CANDIDATE cause this check discriminates\n            hit = [cid for cid, dv in disc.items() if dv == ans and cid not in ruled_out and cid in candidate_causes]\n            if hit:\n                current_cause = hit[0]\n                trace[\"reason\"] = \"cause_confirmed:\" + str(hit[0])\n                case[\"confirmed_cause\"] = current_cause\n                proc = _proc(FMs[matched_fm], current_cause, PROCS)\n                if proc is None:\n                    return _out(locals(), _esc(matched_fm, ruled_out), terminal=True, status=\"unresolved\")\n                case[\"procedure\"] = proc[\"id\"]\n                current_step_idx = 0\n                stage = \"RESOLVE\"\n            elif current_cause:\n                ruled_out = ruled_out + [current_cause]\n                current_cause = None\n        if stage == \"DIAGNOSE\":\n            order = _danger(FMs[matched_fm], candidate_causes, ruled_out)\n            current_cause = next((c for c in order if c not in ruled_out), None)\n            if current_cause is None:\n                return _out(locals(), _esc(matched_fm, ruled_out), terminal=True, status=\"unresolved\")\n            chk = _nextchk(FMs[matched_fm], current_cause, CHECKS, [c[\"ref\"] for c in case.get(\"checks\", [])])\n            if chk is None:\n                return _out(locals(), _esc(matched_fm, ruled_out), terminal=True, status=\"unresolved\")\n            current_check = chk[\"id\"]\n            trace[\"diagnose\"] = {\"candidates\": candidate_causes, \"ruled_out\": ruled_out, \"cause\": current_cause, \"check\": current_check}\n            return _out(locals(), {\"type\": \"ASK_CHECK\",\n                        \"payload\": {\"ask\": chk[\"ask\"], \"answers\": chk.get(\"answers\", [])},\n                        \"allowed_facts\": {\"ask\": chk[\"ask\"], \"observation_type\": chk.get(\"observation_type\")}}, terminal=False)\n\n    # ---- RESOLVE (one step per turn) ----\n    if stage == \"RESOLVE\":\n        proc = PROCS[case[\"procedure\"]]\n        step_ids = proc.get(\"steps\", [])\n        if proc.get(\"kind\") in (\"escalate\", \"defer\"):\n            return _out(locals(), _hand(proc), terminal=True, status=\"unresolved\")\n        if current_step_idx >= len(step_ids):\n            stage = \"VERIFY\"\n            return _out(locals(), {\"type\": \"ASK_CHECK\", \"payload\": {\"ask\": proc[\"closeout\"][\"verify\"]}, \"allowed_facts\": {\"ask\": proc[\"closeout\"][\"verify\"]}}, terminal=False)\n        else:\n            st = STEPS[step_ids[current_step_idx]]\n            current_step_idx = current_step_idx + 1\n            return _out(locals(), {\"type\": \"GIVE_STEP\",\n                        \"payload\": {\"step\": st[\"action\"], \"expected\": st.get(\"expected_result\")},\n                        \"allowed_facts\": {\"step\": st[\"action\"], \"expected\": st.get(\"expected_result\"), \"warnings\": st.get(\"warnings_before\", [])}}, terminal=False)\n\n    # ---- VERIFY (close the loop; capped back-edge) ----\n    if stage == \"VERIFY\":\n        proc = PROCS[case[\"procedure\"]]\n        if kind not in (\"confirmation\", \"check_answer\"):\n            return _out(locals(), {\"type\": \"ASK_CHECK\", \"payload\": {\"ask\": proc[\"closeout\"][\"verify\"]},\n                        \"allowed_facts\": {\"ask\": proc[\"closeout\"][\"verify\"]}}, terminal=False)\n        _v = (value or signal.get(\"text\") or \"\").lower()\n        _neg = re.search(r\"\\b(no|nope|not|isn|wasn|doesn|didn|won|fail|fails|failed|off|mismatch|mismatched|differ|differs|different|wrong|worse|still)\\b\", _v)\n        _pos = re.search(r\"\\b(yes|yeah|yep|yup|ok|okay|good|done|clear|cleared|fixed|resolved|match|matches|matching|aligned|agree|agrees|within|runs|ran|past|passed|passes|holds|held|correct|confirm|clean|mirror)\\b\", _v)\n        if not _pos and not _neg:\n            return _out(locals(), {\"type\": \"ASK_CHECK\", \"payload\": {\"ask\": proc[\"closeout\"][\"verify\"]},\n                        \"allowed_facts\": {\"ask\": proc[\"closeout\"][\"verify\"]}}, terminal=False)\n        if _pos and not _neg:\n            case[\"status\"] = \"resolved\"\n            case[\"outcome\"] = {\"fixed\": True}\n            return _out(locals(), {\"type\": \"RESOLVED\", \"payload\": {}, \"allowed_facts\": {}}, terminal=True, status=\"resolved\")\n        attempts = attempts + 1\n        case.setdefault(\"attempts\", []).append({\"cause\": current_cause, \"procedure\": case.get(\"procedure\")})\n        ruled_out = ruled_out + [current_cause]\n        current_cause = None\n        case[\"confirmed_cause\"] = None\n        case[\"procedure\"] = None\n        if attempts >= attempts_cap:\n            return _out(locals(), _esc(matched_fm, ruled_out), terminal=True, status=\"unresolved\")\n        stage = \"DIAGNOSE\"\n        order = _danger(FMs[matched_fm], candidate_causes, ruled_out)\n        current_cause = next((c for c in order if c not in ruled_out), None)\n        if current_cause is None:\n            return _out(locals(), _esc(matched_fm, ruled_out), terminal=True, status=\"unresolved\")\n        chk = _nextchk(FMs[matched_fm], current_cause, CHECKS, [c[\"ref\"] for c in case.get(\"checks\", [])])\n        current_check = chk[\"id\"] if chk else None\n        return _out(locals(), {\"type\": \"ASK_CHECK\",\n                    \"payload\": ({\"ask\": chk[\"ask\"], \"answers\": chk.get(\"answers\", [])} if chk else {}),\n                    \"allowed_facts\": ({\"ask\": chk[\"ask\"], \"observation_type\": chk.get(\"observation_type\")} if chk else {})}, terminal=False)\n\n    return _out(locals(), _esc(matched_fm, ruled_out), terminal=True, status=\"unresolved\")\n\ndef _best_answer(value, answers):\n    import re as _re\n    v = set(_re.findall(r\"[a-z0-9]+\", (value or \"\").lower()))\n    best, bestscore = (value or \"\"), 0\n    for a in (answers or []):\n        aw = set(_re.findall(r\"[a-z0-9]+\", a.lower()))\n        sc = len(v & aw)\n        if sc > bestscore:\n            bestscore, best = sc, a\n    return best\n\ndef _rank(fm):\n    return [c[\"id\"] for c in sorted(fm[\"causes\"], key=lambda c: c.get(\"seed_prior\", 0), reverse=True)]\n\ndef _danger(fm, order, ro):\n    cs = {c[\"id\"]: c for c in fm[\"causes\"]}\n    d = [c for c in order if c not in ro and (fm.get(\"guardrail\") or cs[c].get(\"action_level\") == \"L3\" or cs[c].get(\"escalate_to\", \"none\") != \"none\")]\n    r = [c for c in order if c not in ro and c not in d]\n    return d + r\n\ndef _nextchk(fm, cid, CHECKS, asked):\n    cause = next(c for c in fm[\"causes\"] if c[\"id\"] == cid)\n    prob = cause.get(\"seed_prior\", 1)\n    cand = [CHECKS[c] for c in cause.get(\"confirm_checks\", []) if c in CHECKS and c not in asked]\n    if not cand:\n        return None\n    cand.sort(key=lambda ch: prob * _SOUL_OBS_WEIGHT.get(ch.get(\"observation_type\"), 1.0) / max(ch.get(\"cost\", {}).get(\"time_min\", 1), 0.1), reverse=True)\n    return cand[0]\n\ndef _proc(fm, cid, PROCS):\n    cause = next(c for c in fm[\"causes\"] if c[\"id\"] == cid)\n    for p in cause.get(\"procedures\", []):\n        if p in PROCS:\n            return PROCS[p]\n    return None\n\ndef _esc(fm, ro):\n    return {\"type\": \"ESCALATE\", \"payload\": {\"matched_fm\": fm, \"ruled_out\": ro}, \"allowed_facts\": {\"ruled_out\": ro}}\n\ndef _hand(proc):\n    h = proc.get(\"handoff\") or {}\n    return {\"type\": \"ESCALATE\", \"payload\": {\"escalate_to\": h.get(\"escalate_to\")}, \"allowed_facts\": {\"escalate_to\": h.get(\"escalate_to\")}}\n\ndef _brief(m):\n    t = m[\"type\"]; p = m.get(\"payload\", {})\n    if t == \"ASK_CHECK\":\n        return \"ASK: \" + str(p.get(\"ask\", \"\"))\n    if t == \"RESOLVED\":\n        return \"RESOLVED: confirm the fix held and close warmly.\"\n    if t == \"ESCALATE\":\n        return \"ESCALATE: hand off to a person; state what was ruled out: \" + str(p.get(\"ruled_out\", \"\"))\n    if t == \"DECLINE\":\n        return \"DECLINE: no good match; offer the worry-list or escalation.\"\n    if t == \"STOP\":\n        return \"STOP: \" + str(p.get(\"reason\", \"\"))\n    if t == \"LOTO\":\n        return \"LOTO: \" + str(p.get(\"reason\", \"\"))\n    _reask = \"Didn't catch that — could you clarify? \" if p.get(\"reask\") else \"\"\n    if t == \"ELICIT\":\n        _ec = p.get(\"candidates\", []); _lead = _ec[0][\"title\"] if _ec else \"\"\n        if int(p.get(\"round\", 1)) <= 1:\n            return _reask + \"ELICIT: the description is too thin to match a known fault. Ask ONE open question for more detail -- what the machine is doing across finish, dimensions, noise, smell, or any alarm number/message. Free text, NO option menu, do NOT name or suggest a cause.\"\n        return _reask + \"ELICIT: still unclear. Ask ONE sharper open question probing the tell-tale signs of the most likely area (\" + _lead + \") -- e.g. its smell, surface finish, sound, or readings -- without asserting that diagnosis. Free text, no menu, and do NOT repeat your previous question.\"\n    if t == \"SANITY\": return _reask + \"SANITY: echo the symptom in a few words, then ask if anything changed in the last hour (new tool, material, program, coolant, anyone touch it). ONE question, no cause hint.\"\n    if t == \"GIVE_STEP\": return _reask + \"STEP: \" + str(p.get(\"step\", \"\")) + (\" | expected: \" + str(p.get(\"expected\")) if p.get(\"expected\") else \"\")\n    if t == \"CLOSEOUT\": return _reask + \"CLOSEOUT (scribe): summarize the operator's fix in THEIR words, then ask 'Confirm to save?'. Do not re-diagnose, no technical follow-ups.\"\n    if t == \"ASK_CLARIFY\": return _reask + \"CLARIFY: ask which of these it's closest to - \" + \", \".join(p.get(\"options\", []))\n    if t == \"INTAKE\":\n        return \"INTAKE: greet briefly and ask what's wrong with the machine. Do not assume or suggest causes.\"\n    return \"OUT_OF_SCOPE: gently redirect to this machine's fault.\"\n\ndef _status(move):\n    t = move[\"type\"]; p = move.get(\"payload\", {})\n    if t == \"ASK_CLARIFY\": return \"diagnosing\"\n    if t == \"RESOLVED\": return \"resolved\"\n    if t in (\"ESCALATE\", \"DECLINE\", \"STOP\"): return \"escalated\"\n    if t == \"SANITY\": return \"sanity\"\n    if t == \"ELICIT\": return \"sanity\"\n    if t == \"GIVE_STEP\": return \"resolving\"\n    if t == \"CLOSEOUT\": return \"verifying\"\n    if t == \"ASK_CHECK\": return \"diagnosing\" if p.get(\"answers\") else \"verifying\"\n    if t == \"LOTO\": return \"verifying\"\n    return \"diagnosing\"\n\ndef _await(move):\n    t = move[\"type\"]; p = move.get(\"payload\", {})\n    if t == \"ASK_CLARIFY\":\n        # deterministic escape, always last, always the same value (see NONE_OF_THESE)\n        return \"clarify\", list(p.get(\"options\", [])) + [NONE_OF_THESE]\n    if t == \"ASK_CHECK\":\n        if p.get(\"answers\"):\n            return \"check\", p.get(\"answers\")\n        return \"verify\", [\"yes\", \"no\"]\n    if t == \"SANITY\":\n        return \"sanity\", [\"nothing changed\", \"something changed\"]\n    if t == \"ELICIT\":\n        return \"elicit\", []\n    if t == \"CLOSEOUT\":\n        return \"closeout\", [\"confirm\", \"not right\"]\n    return \"\", []\n\ndef _modality(move):\n    t = move[\"type\"]; p = move.get(\"payload\", {})\n    if t == \"SANITY\": return \"yes_no\", \"No\"\n    if t == \"ELICIT\": return \"free_text\", \"\"\n    if t == \"CLOSEOUT\": return \"yes_no\", \"\"\n    if t == \"ASK_CLARIFY\": return \"mcq\", \"\"\n    if t == \"ASK_CHECK\": return (\"mcq\", \"\") if p.get(\"answers\") else (\"yes_no\", \"\")\n    return \"free_text\", \"\"\n\ndef _disp_options(move):\n    ak, ao = _await(move)\n    if move[\"type\"] == \"SANITY\": return [\"No\", \"Yes\"]\n    if ak in (\"check\", \"verify\", \"closeout\", \"clarify\"): return ao\n    return []\n\ndef _out(L, move, terminal, status=None):\n    case = L[\"case\"]\n    if status:\n        case[\"status\"] = status\n    return {\n        \"move_type\": move[\"type\"],\n        \"render_brief\": _brief(move),\n        \"allowed_facts\": json.dumps(move.get(\"allowed_facts\", {})),\n        \"terminal\": \"true\" if terminal else \"false\",\n        \"out_stage\": L[\"stage\"],\n        \"out_case\": json.dumps(case),\n        \"out_matched_fm\": L[\"matched_fm\"] or \"\",\n        \"out_candidate_causes\": json.dumps(L[\"candidate_causes\"] or []),\n        \"out_ruled_out\": json.dumps(L[\"ruled_out\"] or []),\n        \"out_current_cause\": L[\"current_cause\"] or \"\",\n        \"out_current_check\": L[\"current_check\"] or \"\",\n        \"out_current_step_idx\": int(L[\"current_step_idx\"] or 0),\n        \"out_attempts\": int(L[\"attempts\"] or 0),\n        \"out_clarify_attempts\": int(L.get(\"clarify_attempts\") or 0),\n        \"out_elicit_attempts\": int(L.get(\"elicit_attempts\") or 0),\n        \"out_await_kind\": _await(move)[0],\n        \"out_await_options\": json.dumps(_await(move)[1]),\n        \"out_trace\": json.dumps({**(L.get(\"trace\") or {}), \"move\": move[\"type\"], \"stage_out\": L[\"stage\"], \"terminal\": bool(terminal)}, ensure_ascii=False),\n        \"out_status\": _status(move),\n        \"out_options\": json.dumps(_disp_options(move)),\n        \"out_modality\": _modality(move)[0],\n        \"out_default\": _modality(move)[1],\n        \"out_capture\": (\n            (case.get(\"resolution_note\") or (\"resolved via \" + (case.get(\"procedure\") or \"\") + \"; cause \" + (case.get(\"confirmed_cause\") or \"\")))\n            if move[\"type\"] == \"RESOLVED\" else\n            (\"handoff: \" + (case.get(\"matched_fm\") or \"no-match\") + \"; ruled out: \" + \", \".join(L[\"ruled_out\"] or []))\n            if move[\"type\"] in (\"ESCALATE\", \"DECLINE\") else \"\"\n        ),\n    }\n"
