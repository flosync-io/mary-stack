    - id: guard
      position:
        x: 720
        y: 300
      data:
        type: code
        title: N2 GuardPre
        desc: deterministic, fail-closed. Decision-SOUL lives here (never endorse / bypass / bait).
        code_language: python3
        variables:
        - variable: signal
          value_selector:
          - interpret
          - structured_output
          value_type: object
        - variable: knowledge_json
          value_selector:
          - kb_pick
          - knowledge
          value_type: string
        outputs:
          guard_decision:
            type: string
            children: null
          guard_reason:
            type: string
            children: null
        code: "import json\ndef main(signal, knowledge_json):\n    K = json.loads(knowledge_json or \"{}\")\n    if isinstance(signal, str):\n        signal = json.loads(signal or \"{}\")\n    never = []\n    for fm in K.get(\"failure_modes\", []):\n        if fm.get(\"anti_pattern\"):\n            never.append(fm[\"anti_pattern\"].lower())\n    for w in K.get(\"warnings\", []):\n        never.append(w.get(\"text\", \"\").lower())\n    never += [p.lower() for p in K.get(\"never_do\", [])]\n    text = (signal.get(\"text\") or \"\").lower()\n    kind = signal.get(\"kind\")\n    BYPASS = [\"disable\", \"bypass\", \"override\", \"defeat\", \"jumper\",\n              \"tape over\", \"ignore the alarm\", \"force it\", \"run it anyway\"]\n    if kind == \"safety_question\" or any(b in text for b in BYPASS):\n        return {\"guard_decision\": \"STOP\",\n                \"guard_reason\": \"That touches a safety protection — I can't help bypass it. Let's get a person.\"}\n    for nd in never:\n        if nd and nd in text:\n            return {\"guard_decision\": \"STOP\",\n                    \"guard_reason\": \"That shortcut isn't a safe, endorsed move. I won't confirm it.\"}\n    return {\"guard_decision\": \"PROCEED\", \"guard_reason\": \"\"}\n"
        selected: false
      type: custom
      selected: false
      sourcePosition: right
      targetPosition: left
      width: 244
      height: 120
      positionAbsolute:
        x: 720
        y: 300
