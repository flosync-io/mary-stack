        code: "import json, re\ndef main(message, status, options_json, capture, trace=\"\", allowed_facts=\"{}\", modality=\"\", default=\"\"):\n    try:\n        opts = json.loads(options_json or \"[]\")\n    except Exception:\n        opts = []\n    # #5 fact-whitelist: machine values in the message must trace to allowed_facts\n    try:\n        af_text = json.dumps(json.loads(allowed_facts or \"{}\"))\n    except Exception:\n        af_text = allowed_facts or \"\"\n    msg = message or \"\"\n    # machine-value patterns: N-lines, G/M codes, decimals (offsets/feeds), 4-6 digit codes\n    cands = re.findall(r\"\\bN\\d{1,5}\\b|\\b[GM]\\d{1,3}\\b|-?\\d+\\.\\d+|\\b\\d{4,6}\\b\", msg)\n    blocked = next((t for t in cands if t not in af_text), None)\n    if blocked is not None:\n        msg = \"Let me double-check that against the manual before I give you a number - one sec.\"\n    env = {\"message\": msg, \"status\": status or \"\", \"options\": opts, \"capture\": capture or \"\", \"modality\": modality or \"free_text\"}\n    if default:\n        env[\"default\"] = default\n    if trace:\n        try:\n            tr = json.loads(trace)\n        except Exception:\n            tr = trace\n        if isinstance(tr, dict) and blocked is not None:\n            tr[\"_gate\"] = \"blocked:\" + str(blocked)\n        env[\"_trace\"] = tr\n    return {\"envelope\": json.dumps(env, ensure_ascii=False)}\n"
