, {"id": "proc_escalate_zone", "kind": "escalate", "resolves": {"failure_mode": "fm_protection_zone_violation", "causes": ["cause_program_path_through_zone"]}, "steps": [], "handoff": {"action": "Escalate to programmer/maintenance: a protection/collision-zone alarm (10700-10704) \u2014 operator never overrides the zone. Program/setup is reviewed, retracted, and corrected by the owner.", "escalate_to": "programmer", "capture_fields": ["alarm number", "block", "operation", "machine mode"]}, "source": {"type": "authored_seed", "source_ref": null, "sme": "op_vet", "soul_version": "draft", "approved_by": "pending"}}, {"id": "proc_escalate_safety", "kind": "escalate", "resolves": {"failure_mode": null, "causes": ["cause_si_safe_stop", "cause_si_not_safely_referenced", "cause_si_safe_limit_exceeded", "cause_si_checksum_acceptance"]}, "steps": [], "handoff": {"action": "STOP and escalate to maintenance: a Safety Integrated event \u2014 a 27xxx alarm (safe-stop / STOP A\u2013E, safe-referencing, safe-motion limit, or SI checksum/acceptance-test) or a 30xx E-stop. Never override, suppress, force-reset, widen a safe limit, or ''acknowledge away'' an acceptance-test alarm. Record the number and the event; investigate, do not clear-and-rerun. SI checksum / hardware-change alarms require a documented acceptance test by qualified personnel (AS9100).", "escalate_to": "maintenance", "capture_fields": ["alarm number/text", "SI sub-class (safe-stop / not-referenced / safe-motion / checksum-acceptance)", "preceding event (e.g. door, power-up, hardware/parameter change)", "machine state at stop"]}, "source": {"type": "authored_seed", "source_ref": null, "sme": "op_vet", "soul_version": "draft", "approved_by": "pending"}}, {"id": "proc_defer_oem_alarm", "kind": "defer", "resolves": {"failure_mode": "fm_oem_magazine_fault", "causes": ["cause_oem_builder_alarm"]}, "steps": [], "handoff": {"action": "DEFER to DMG MORI: a 7xxxxx builder-band alarm has no Siemens meaning. Read back the on-control OEM text + clear symbol, record the number, and route to maintenance/DMG MORI docs. Never guess a cause or clearing action; never clear an unknown changer alarm with the spindle present.", "escalate_to": "maintenance", "capture_fields": ["7xxxxx number (as shown)", "OEM alarm text", "clear/cancel symbol", "what the changer was doing (e.g. arm didn''t retract)"]}, "source": {"type": "authored_seed", "source_ref": null, "sme": "op_vet", "soul_version": "draft", "approved_by": "pending"}}, {"id": "proc_check_correct_coolant_concentration", "kind": "operator_fix", "resolves": {"failure_mode": "fm_coolant_concentration_low", "causes": ["cause_coolant_low_concentration"]}, "preliminary": {"safety": [{"type": "caution", "require": "nitrile gloves + eye protection; do not add water to concentrate (oil-in-last); do not add biocide without authorization", "ref": "warn_coolant_ppe"}], "tools": ["refractometer", "clean DI/RO water", "pre-mixed coolant at target %", "coolant log"], "skill": "operator", "est_min": 15}, "steps": ["stp_zero_refractometer", "stp_sample_and_read", "stp_correct_concentration", "stp_log_coolant"], "closeout": {"verify": "Re-measured concentration sits within the product PDS band after circulation; finish/films improving.", "on_verify_fail": "If concentration is in-band but finish/tool-life is still off, or smell/pH is sour, flag to Denver/lead \u2014 do not dose biocide.", "restore": [], "capture": ["Brix reading", "computed concentration %", "top-up amount", "log entry"]}, "handoff": null, "source": {"type": "authored_seed", "source_ref": null, "sme": "op_vet", "soul_version": "draft", "approved_by": "pending"}}, {"id": "proc_swap_insert", "kind": "operator_fix", "resolves": {"failure_mode": "fm_chatter", "causes": ["cause_worn_insert"]}, "preliminary": {"safety": [], "tools": ["fresh insert", "torx key"], "skill": "operator", "est_min": 5}, "steps": ["stp_swap_insert"], "closeout": {"verify": "Fresh insert fitted; a test pass gives a clean finish with no chatter.", "on_verify_fail": "reopen_diagnosis", "restore": ["return to AUTO"], "capture": ["which insert", "finish result"]}, "handoff": null, "source": {"type": "authored_seed", "source_ref": null, "sme": "op_vet", "soul_version": "draft", "approved_by": "pending"}}], "steps": [{"id": "stp_confirm_zone_clear", "action": "Confirm the work zone is clear and you know where the tool, spindle and B/C head/table are before any motion.", "component_ref": "cmp_machine_dmc80fd", "warnings_before": ["warn_known_position"], "media": null, "expected_result": "Operator confirms a clear zone and known machine position.", "complexity": "low", "skippable": false}, {"id": "stp_select_ref_mode", "action": "Select JOG / REF POINT mode.", "component_ref": "cmp_operator_panel", "media": null, "expected_result": "Control is in REF mode, ready to home axes.", "complexity": "low", "skippable": false}, {"id": "stp_reference_axes", "action": "Reference (home) each axis that is missing its symbol, traversing toward the reference point.", "component_ref": "cmp_linear_axes", "warnings_before": ["warn_known_position"], "media": null, "expected_result": "Each axis reaches its reference point; smooth even travel, no following-error alarm.", "complexity": "low", "skippable": false}, {"id": "stp_verify_ref_symbols", "action": "Confirm every axis now shows its reference symbol on the position page.", "component_ref": "cmp_offset_screens", "media": null, "expected_result": "All axes referenced.", "complexity": "low", "skippable": false}, {"id": "stp_open_work_offset", "action": "Open the Work Offset (zero offset) screen and identify the ACTIVE offset (e.g. G54).", "component_ref": "cmp_offset_screens", "media": null, "expected_result": "Active work offset and its part-zero values are displayed.", "complexity": "low", "skippable": false}, {"id": "stp_compare_g54_sheet", "action": "Compare the active G54 part zero against the traveler/setup-sheet datum (work offset = where the part is, not tool length). Do not nudge or widen anything.", "component_ref": "cmp_offset_screens", "warnings_before": ["warn_no_widen_limit"], "media": null, "expected_result": "Either G54 matches the sheet (escalate if still alarming) or a clear mismatch is found.", "complexity": "low", "skippable": false, "on_deviation": {"policy": "stop_and_escalate", "branch_ref": "proc_escalate_offset_programmer", "safe_state": "machine stopped, alarm uncleared", "capture": true}}, {"id": "stp_read_traveler_library", "action": "Read the program name, tool-library name, and fixture ID+revision verbatim from the traveler, then read the active program and loaded library name on the control. Compare character-for-character (case-sensitive, watch the revision suffix and look-alikes 0/O, 1/l).", "component_ref": "cmp_tool_library", "media": null, "expected_result": "A definite match or mismatch of names is established.", "complexity": "medium", "skippable": false}, {"id": "stp_load_correct_library", "action": "If the names do not agree, load the library named on the traveler for this fixture revision. Do NOT pick the closest-looking one.", "component_ref": "cmp_tool_library", "warnings_before": ["warn_no_closest_library"], "media": null, "expected_result": "The library named on the traveler is the active TO unit.", "complexity": "medium", "skippable": false, "on_deviation": {"policy": "stop_and_escalate", "branch_ref": "proc_escalate_orientation_programmer", "safe_state": "machine stopped", "capture": true}}, {"id": "stp_proveout_slow", "action": "Prove out from a sanctioned restart point in single block, feed/rapid override down with a hand on feed-hold; do not block-search into the middle of a transformed move.", "component_ref": "cmp_machine_dmc80fd", "warnings_before": ["warn_no_blocksearch_transform"], "media": null, "expected_result": "Program passes the previously faulting orientation block under controlled feed.", "complexity": "high", "skippable": false}, {"id": "stp_compare_pocket_sheet", "action": "On the Magazine list, find the called tool and compare its pocket against the setup-sheet assignment.", "component_ref": "cmp_tool_changer", "media": null, "expected_result": "Tool''s actual pocket vs assigned pocket is known.", "complexity": "low", "skippable": false}, {"id": "stp_return_tool_to_pocket", "action": "If the tool is in the wrong pocket, place it in the setup-sheet pocket (spindle stopped, changer at rest).", "component_ref": "cmp_tool_changer", "warnings_before": ["warn_known_position"], "media": null, "expected_result": "Called tool is in its assigned pocket; the program resolves it.", "complexity": "low", "skippable": false}, {"id": "stp_zero_refractometer", "action": "Zero the handheld refractometer on clean water (ideally the same DI/RO water used to mix coolant); wipe the prism dry.", "component_ref": "cmp_coolant_flood", "warnings_before": ["warn_coolant_ppe"], "media": null, "expected_result": "Refractometer reads zero on clean water (calibrated).", "complexity": "low", "skippable": false}, {"id": "stp_sample_and_read", "action": "Sample coolant from the delivery nozzle (not a stagnant sump corner), read Brix at the light/dark boundary, multiply by the product PDS factor to get concentration %.", "component_ref": "cmp_coolant_flood", "media": null, "expected_result": "A concentration % value, compared against the PDS band. A blurry boundary means unstable emulsion/tramp oil \u2014 clean up and re-sample.", "complexity": "medium", "skippable": false}, {"id": "stp_correct_concentration", "action": "If too low, add pre-mixed coolant (richer than target) following oil-in-last; if too high, add DI/RO water gradually. Make small changes; circulate before re-measuring.", "component_ref": "cmp_coolant_flood", "warnings_before": ["warn_coolant_ppe"], "media": null, "expected_result": "Concentration moves toward the PDS band; re-measure after circulation rather than chasing one reading.", "complexity": "medium", "skippable": false}, {"id": "stp_log_coolant", "action": "Record the concentration reading and top-up amount in the coolant log.", "component_ref": "cmp_coolant_flood", "media": null, "expected_result": "Coolant log updated (the trend matters more than any single reading).", "complexity": "low", "skippable": true}, {"id": "stp_swap_insert", "action": "Swap to a fresh insert (same grade/geometry), seat it properly, then run a test pass at the same feed and speed.", "component_ref": "cmp_spindle", "warnings_before": ["Spindle stopped and safe before reaching in"], "media": null, "expected_result": "Clean finish, no chatter marks", "complexity": "low", "skippable": false}], "warnings": [{"id": "warn_known_position", "text": "Never jog blind or cycle-start without knowing tool, spindle and 5-axis (B/C) positions and that the work zone is clear \u2014 especially after a stop, block-search, or offset change."}, {"id": "warn_no_widen_limit", "text": "Never widen a software/overtravel limit, and never eyeball/nudge an offset to make a move reach. A limit hit is a real position fault / machine-protection boundary, not a setting to relax (AS9100 change control)."}, {"id": "warn_no_closest_library", "text": "Never load the closest-looking tool library/recipe to keep moving. A name mismatch (case-sensitive, revision suffix) is a revision-control question for the setter/programmer/quality \u2014 not an operator edit. On titanium this is how a high-value forging gets scrapped."}, {"id": "warn_no_blocksearch_transform", "text": "Do not block-search into the middle of a 5-axis/transformed move to skip a stop \u2014 the assumed transformation/frame and rotary angles may not be re-established and the tool can plunge into the part or fixture."}, {"id": "warn_no_invent_tool_data", "text": "Never hand-type or make up a tool length/diameter to clear a stop \u2014 it is the fastest crash in the building. If the data is blank/wrong, escalate; the programmer measures and sets it."}, {"id": "warn_safety_no_override", "text": "Never override, suppress, or force-reset a Safety Integrated / 27xxx safe stop, and never bypass a door interlock or treat E-stop/RESET/mode-switch as a lockout. A safe stop is investigated, not cleared."}, {"id": "warn_oem_defer", "text": "Never invent a cause or clearing action for a 7xxxxx DMG MORI builder-band alarm; read back the on-control OEM text + clear symbol and defer to DMG MORI docs/maintenance."}, {"id": "warn_coolant_ppe", "text": "Wear nitrile gloves + eye protection with coolant; add concentrate to water (oil-in-last), never water to concentrate; never dose biocide without authorization; never run titanium cuts dry."}], "never_do": ["single-block", "don''t single-block", "skip the dry run", "skip proveout", "skip the proveout", "skip dry-run", "bump the offset", "bump a work offset", "nudge the offset", "eyeball the offset", "eyeball a offset", "eyeball an offset", "reset and re-run", "reset and rerun", "reset and run it again", "hit reset and re-run", "just reset and", "top up coolant by feel", "coolant by feel", "by feel", "closest library", "closest-looking", "grab the closest", "grab a library", "widen the limit", "widen the soft limit", "widen the software limit", "back off the limit", "back off the coolant", "change the angle and run", "tool length i think", "type in a tool length", "a length i think is right", "acknowledge the safety stop", "bypass the safety", "ignore the safety"]}'
